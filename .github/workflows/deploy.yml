name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: git clone --depth 1 --branch v4 https://github.com/jackyzha0/quartz.git quartz-build

      - name: Copy vault content
        run: |
          rm -rf quartz-build/content/*
          cp -r universe/* quartz-build/content/
          # Remove Obsidian config and trash from build
          rm -rf quartz-build/content/.obsidian
          rm -rf quartz-build/content/.trash
          rm -rf quartz-build/content/.stfolder*

      - name: Configure Quartz
        run: |
          cd quartz-build
          sed -i 's|pageTitle: ".*"|pageTitle: "Universe"|' quartz.config.ts
          sed -i 's|baseUrl: ".*"|baseUrl: "erkantaylan.github.io/Obsidian"|' quartz.config.ts

      - name: Build
        run: |
          cd quartz-build
          npm ci
          npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz-build/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
